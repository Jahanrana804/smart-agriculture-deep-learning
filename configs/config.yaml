augmentation:
  intensity: medium
data:
  batch_size: 32
  image_size: 224
  num_classes: 38
  num_workers: 4
  train_dir: data/plantvillage/train
  val_dir: data/plantvillage/valid
ddpm:
  batch_size: 16
  epochs: 50
  image_size: 64
  lr: 0.0002
  timesteps: 1000
gan:
  batch_size: 64
  epochs: 100
  image_size: 64
  latent_dim: 100
  lr: 0.0002
paths:
  log_dir: logs/
  samples_dir: samples/
  save_dir: checkpoints/
train:
  epochs: 25
  lr: 0.001
  scheduler: cosine
  weight_decay: 0.0001
vit:
  depth: 12
  drop_path_rate: 0.1
  embed_dim: 768
  epochs: 20
  label_smoothing: 0.1
  lr: 0.0001
  num_heads: 12
  patch_size: 16
  weight_decay: 0.0001
